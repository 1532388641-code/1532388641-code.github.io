把城市批发市场视为图节点，物流通道、距离、供应量与价格相关性视为边。
当前版本针对低内存设备进行了稀疏化处理。

from __future__ import annotations

from collections import defaultdict
from dataclasses import dataclass
from datetime import date, timedelta
from statistics import mean
from typing import Dict, Iterable, List, Mapping, Sequence, Tuple
import json
import math
import random


@dataclass(frozen=True)
class MarketNode:
    city_code: str
    market_name: str
    latitude: float
    longitude: float
    supply_index: float
    transport_index: float
    population_weight: float
    storage_capacity: float


@dataclass(frozen=True)
class MarketEdge:
    source: int
    target: int
    distance_km: float
    price_correlation: float
    transport_pressure: float
    seasonal_weight: float


@dataclass
class RegionSnapshot:
    day: date

    prices: Dict[str, float]
    supply: Dict[str, float]
    transport: Dict[str, float]

    temperature: Dict[str, float]


def haversine_distance(
    lat1: float,
    lon1: float,
    lat2: float,
    lon2: float,
) -> float:
    earth_radius = 6371.0088
    phi1 = math.radians(lat1)
    phi2 = math.radians(lat2)
    delta_phi = math.radians(lat2 - lat1)
    delta_lambda = math.radians(lon2 - lon1)

    value = (
        math.sin(delta_phi / 2.0) ** 2
        + math.cos(phi1)
        * math.cos(phi2)
        * math.sin(delta_lambda / 2.0) ** 2
    )
    return 2.0 * earth_radius * math.asin(math.sqrt(value))


def safe_mean(values: Sequence[float]) -> float:
    if not values:
        return 0.0
    return float(mean(values))


def normalize(values: Sequence[float]) -> List[float]:
    if not values:
        return []

    low = min(values)
    high = max(values)
    span = high - low

    if span <= 1e-12:
        return [0.0 for _ in values]

    return [
        (value - low) / span
        for value in values
    ]


class SparseRegionGraph:
    """只保留最有价值的区域联动边。"""

    def __init__(
        self,
        max_neighbors: int = 4,
        max_distance_km: float = 900.0,
        min_correlation: float = 0.42,
    ) -> None:
        self.max_neighbors = max_neighbors
        self.max_distance_km = max_distance_km
        self.min_correlation = min_correlation
        self.nodes: List[MarketNode] = []
        self.edges: List[MarketEdge] = []
        self.index_by_code: Dict[str, int] = {}

    def add_nodes(
        self,
        nodes: Iterable[MarketNode],
    ) -> None:
        for node in nodes:
            if node.city_code in self.index_by_code:
                raise ValueError(
                    f"duplicate city code: {node.city_code}"
                )

            self.index_by_code[node.city_code] = len(self.nodes)
            self.nodes.append(node)

    def build_edges(
        self,
        correlation: Mapping[Tuple[str, str], float],
        seasonal_weights: Mapping[Tuple[str, str], float],
    ) -> None:
        candidates: Dict[int, List[MarketEdge]] = defaultdict(list)

        for source, left in enumerate(self.nodes):
            for target, right in enumerate(self.nodes):
                if source == target:
                    continue

                distance = haversine_distance(
                    left.latitude,
                    left.longitude,
                    right.latitude,
                    right.longitude,
                )
                if distance > self.max_distance_km:
                    continue

                pair = (left.city_code, right.city_code)
                corr = correlation.get(pair, 0.0)
                if corr < self.min_correlation:
                    continue

                pressure = (
                    right.transport_index
                    / max(right.supply_index, 0.01)
                )
                season = seasonal_weights.get(pair, 1.0)

                candidates[source].append(
                    MarketEdge(
                        source=source,
                        target=target,
                        distance_km=round(distance, 2),
                        price_correlation=round(corr, 5),
                        transport_pressure=round(pressure, 5),
                        seasonal_weight=round(season, 5),
                    )
                )

        self.edges.clear()

        for source, items in candidates.items():
            ranked = sorted(
                items,
                key=lambda edge: (
                    -edge.price_correlation,
                    edge.distance_km,
                    -edge.seasonal_weight,
                ),
            )
            self.edges.extend(ranked[: self.max_neighbors])

    def inbound_edges(
        self,
        node_index: int,
    ) -> List[MarketEdge]:
        return [
            edge
            for edge in self.edges
            if edge.target == node_index
        ]

    def neighbor_features(
        self,
        node_index: int,
        prices: Sequence[float],
    ) -> List[float]:
        selected = self.inbound_edges(node_index)

        if not selected:
            return [0.0, 0.0, 0.0, 0.0]

        weighted_price = 0.0
        weight_total = 0.0
        pressure_values: List[float] = []
        distances: List[float] = []

        for edge in selected:
            weight = (
                edge.price_correlation
                * edge.seasonal_weight
                / (1.0 + edge.distance_km / 500.0)
            )

            weighted_price += prices[edge.source] * weight
            weight_total += weight
            pressure_values.append(edge.transport_pressure)
            distances.append(edge.distance_km)

        return [
            weighted_price / max(weight_total, 1e-8),
            safe_mean(pressure_values),
            safe_mean(distances),
            float(len(selected)),
        ]

    def to_payload(self) -> Dict[str, object]:
        return {
            "nodes": [
                {
                    "city_code": node.city_code,
                    "market_name": node.market_name,
                    "latitude": node.latitude,
                    "longitude": node.longitude,
                    "supply_index": node.supply_index,
                    "transport_index": node.transport_index,
                    "population_weight": node.population_weight,
                    "storage_capacity": node.storage_capacity,
                }
                for node in self.nodes
            ],
            "edges": [
                {
                    "source": edge.source,
                    "target": edge.target,
                    "distance_km": edge.distance_km,
                    "price_correlation": edge.price_correlation,
                    "transport_pressure": edge.transport_pressure,
                    "seasonal_weight": edge.seasonal_weight,
                }
                for edge in self.edges
            ],
        }


class RegionFeatureEncoder:
    def __init__(
        self,
        graph: SparseRegionGraph,
        lag_windows: Sequence[int] = (1, 3, 7, 14, 28),
        rolling_windows: Sequence[int] = (7, 14, 30),
    ) -> None:
        self.graph = graph
        self.lag_windows = tuple(lag_windows)
        self.rolling_windows = tuple(rolling_windows)

    def calendar_features(
        self,
        day: date,
    ) -> List[float]:
        week = day.isocalendar().week
        return [
            float(day.month),
            float(day.weekday()),
            float(week),
            float(day.weekday() >= 5),
            math.sin(2.0 * math.pi * day.month / 12.0),
            math.cos(2.0 * math.pi * day.month / 12.0),
            math.sin(2.0 * math.pi * day.timetuple().tm_yday / 365.0),
            math.cos(2.0 * math.pi * day.timetuple().tm_yday / 365.0),
        ]

    def lag_features(
        self,
        values: Sequence[float],
    ) -> List[float]:
        result: List[float] = []

        for lag in self.lag_windows:
            if len(values) >= lag:
                result.append(float(values[-lag]))
            else:
                result.append(float(values[0]))

        return result

    def rolling_features(
        self,
        values: Sequence[float],
    ) -> List[float]:
        result: List[float] = []

        for window in self.rolling_windows:
            selected = list(values[-window:])
            avg = safe_mean(selected)
            variance = safe_mean([
                (value - avg) ** 2
                for value in selected
            ])

            result.extend([
                avg,
                math.sqrt(variance),
                min(selected),
                max(selected),
            ])

        return result

    def weather_features(
        self,
        rainfall: float,
        temperature: float,
        humidity: float,
    ) -> List[float]:
        return [
            rainfall,
            temperature,
            humidity,
            rainfall * temperature,
            humidity * temperature,
            float(rainfall >= 25.0),
            float(temperature >= 33.0),
            float(temperature <= -15.0),
        ]

    def supply_features(
        self,
        supply: float,
        transport_index: float,
        fuel_price: float,
        storage_capacity: float,
    ) -> List[float]:
        return [
            supply,
            transport_index,
            fuel_price,
            storage_capacity,
            transport_index / max(supply, 0.01),
            fuel_price * transport_index,
            storage_capacity / max(supply, 0.01),
            float(supply < 0.75),
        ]

    def encode(
        self,
        node_index: int,
        day: date,
        history: Sequence[float],
        regional_prices: Sequence[float],
        rainfall: float,
        temperature: float,
        humidity: float,
        supply: float,
        transport_index: float,
        fuel_price: float,
    ) -> List[float]:
        node = self.graph.nodes[node_index]

        features: List[float] = []
        features.extend(self.calendar_features(day))
        features.extend(self.lag_features(history))
        features.extend(self.rolling_features(history))
        features.extend(
            self.weather_features(
                rainfall=rainfall,
                temperature=temperature,
                humidity=humidity,
            )
        )
        features.extend(
            self.supply_features(
                supply=supply,
                transport_index=transport_index,
                fuel_price=fuel_price,
                storage_capacity=node.storage_capacity,
            )
        )
        features.extend(
            self.graph.neighbor_features(
                node_index=node_index,
                prices=regional_prices,
            )
        )

        return features


def build_demo_graph(
    seed: int = 720,
) -> SparseRegionGraph:
    random.seed(seed)
    graph = SparseRegionGraph(
        max_neighbors=3,
        max_distance_km=1150.0,
        min_correlation=0.40,
    )

    nodes = [
        MarketNode("HRB", "哈达市场", 45.75, 126.63, 1.08, 1.12, 0.76, 0.88),
        MarketNode("CC", "海吉星市场", 43.82, 125.32, 1.02, 1.05, 0.71, 0.81),
        MarketNode("SY", "盛发市场", 41.80, 123.43, 0.96, 1.09, 0.92, 0.84),
        MarketNode("BJ", "新发地市场", 39.90, 116.40, 1.31, 1.16, 1.00, 0.93),
        MarketNode("JN", "七里堡市场", 36.67, 117.00, 0.91, 1.08, 0.81, 0.76),
        MarketNode("ZZ", "万邦市场", 34.75, 113.62, 1.18, 1.11, 0.86, 0.90),
        MarketNode("SJZ", "桥西市场", 38.04, 114.51, 0.94, 1.07, 0.79, 0.78),
        MarketNode("TY", "河西市场", 37.87, 112.55, 0.89, 1.04, 0.68, 0.73),
        MarketNode("XA", "欣桥市场", 34.34, 108.94, 0.97, 1.10, 0.82, 0.79),
        MarketNode("WH", "白沙洲市场", 30.59, 114.30, 1.09, 1.14, 0.91, 0.87),
        MarketNode("CS", "红星市场", 28.22, 112.94, 1.03, 1.08, 0.78, 0.82),
        MarketNode("CD", "濛阳市场", 30.67, 104.06, 1.14, 1.17, 0.88, 0.91),
    ]
    graph.add_nodes(nodes)

    correlation: Dict[Tuple[str, str], float] = {}
    seasonal: Dict[Tuple[str, str], float] = {}

    for left in nodes:
        for right in nodes:
            if left.city_code == right.city_code:
                continue

            correlation[
                (left.city_code, right.city_code)
            ] = round(
                random.uniform(0.36, 0.93),
                5,
            )

            seasonal[
                (left.city_code, right.city_code)
            ] = round(
                random.uniform(0.72, 1.18),
                5,
            )

    graph.build_edges(
        correlation=correlation,
        seasonal_weights=seasonal,
    )
    return graph


def build_demo_history(
    seed: int = 720,
    days: int = 180,
) -> List[float]:
    random.seed(seed)
    values: List[float] = []
    base_price = 3.65

    for day_index in range(days):
        weekly = math.sin(day_index / 7.0 * math.pi) * 0.14
        monthly = math.sin(day_index / 30.0 * math.pi) * 0.22
        transport = math.cos(day_index / 11.0) * 0.08
        noise = random.uniform(-0.07, 0.07)

        price = (
            base_price
            + weekly
            + monthly
            + transport
            + noise
        )
        values.append(
            round(max(price, 0.1), 2)
        )

    return values


def main() -> None:
    graph = build_demo_graph()
    encoder = RegionFeatureEncoder(graph)

    history = build_demo_history()
    regional_prices = [
        round(3.2 + index * 0.11, 2)
        for index in range(len(graph.nodes))
    ]

    features = encoder.encode(
        node_index=0,
        day=date(2026, 7, 18),

        regional_prices=regional_prices,

    )

    payload = graph.to_payload()
    payload["feature_count"] = len(features)
    payload["preview"] = features[:12]

    print(
        json.dumps(
            payload,
            ensure_ascii=False,
            indent=2,
        )
    )


if __name__ == "__main__":
    main()

    residual = sum(
        (a - p) ** 2
        for a, p in zip(actual, predicted)
    )
    total = sum(
        (a - center) ** 2
        for a in actual
    )
    return 1.0 - residual / max(total, 1e-8)


def simple_forecast(
    history: Sequence[float],
    horizon: int,
    window: int = 14,
) -> List[float]:
    values = list(history)
    result: List[float] = []

    for step in range(horizon):
        recent = values[-window:]
        local_mean = mean(recent)
        trend = (
            recent[-1] - recent[0]
        ) / max(window - 1, 1)
        seasonal = (
            math.sin(
                (len(values) + step)
                / 7.0
                * math.pi
            )
            * 0.06
        )

        value = max(
            0.1,
            local_mean
            + trend * 0.7
            + seasonal,
        )
        value = round(value, 3)
        values.append(value)
        result.append(value)

    return result


def rolling_splits(
    values: Sequence[float],
    folds: int = 5,
    validation_size: int = 21,
) -> Iterable[Tuple[List[float], List[float]]]:
    total_required = (
        folds * validation_size
        + validation_size
    )
    if len(values) < total_required:
        raise ValueError(
            "not enough values for rolling validation"
        )

    start = len(values) - folds * validation_size

    for fold in range(folds):
        split = start + fold * validation_size
        train_values = list(values[:split])
        valid_values = list(
            values[
                split:
                split + validation_size
            ]
        )
        yield train_values, valid_values


def evaluate_fold(
    fold_index: int,
    train_values: Sequence[float],
    valid_values: Sequence[float],
) -> FoldMetrics:
    started = time.perf_counter()

    rolling = list(train_values)
    predicted: List[float] = []

    for actual in valid_values:
        next_value = simple_forecast(
            history=rolling,
            horizon=1,
        )[0]
        predicted.append(next_value)
        rolling.append(actual)

    elapsed = time.perf_counter() - started

    return FoldMetrics(
        fold=fold_index,
        mae=round(mae(valid_values, predicted), 5),
        mape=round(mape(valid_values, predicted), 5),
        r2=round(r2(valid_values, predicted), 5),
        elapsed_seconds=round(elapsed, 4),
    )


def save_checkpoint(
    fold_metrics: FoldMetrics,
) -> None:
    CHECKPOINT_DIR.mkdir(
        parents=True,
        exist_ok=True,
    )

    target = CHECKPOINT_DIR / (
        f"fold_{fold_metrics.fold:02d}.json"
    )
    target.write_text(
        json.dumps(
            asdict(fold_metrics),
            ensure_ascii=False,
            indent=2,
        ),
        encoding="utf-8",
    )


def train(
    seed: int = 720,
) -> TrainingResult:
    random.seed(seed)
    graph = build_demo_graph(seed=seed)
    encoder = RegionFeatureEncoder(graph)
    history = build_demo_history(
        seed=seed,
        days=240,
    )

    example_features = encoder.encode(
        node_index=0,
        day=datetime.now().date(),
        history=history,
        regional_prices=[
            3.0 + index * 0.12
            for index in range(len(graph.nodes))
        ],
        rainfall=10.6,
        temperature=27.4,
        humidity=0.72,
        supply=1.08,
        transport_index=1.12,
        fuel_price=7.58,
    )

    folds: List[FoldMetrics] = []

    for fold_index, (
        train_values,
        valid_values,
    ) in enumerate(
        rolling_splits(history),
        start=1,
    ):
        metrics = evaluate_fold(
            fold_index=fold_index,
            train_values=train_values,
            valid_values=valid_values,
        )
        folds.append(metrics)
        save_checkpoint(metrics)

    forecast = simple_forecast(
        history=history,
        horizon=14,
    )

    result = TrainingResult(
        project="agri-price-predictor",
        branch="feature/region-linkage",
        created_at=datetime.now().isoformat(),
        feature_count=len(example_features),
        city_count=len(graph.nodes),
        edge_count=len(graph.edges),
        folds=folds,
        mean_mape=round(
            mean(item.mape for item in folds),
            5,
        ),
        mean_r2=round(
            mean(item.r2 for item in folds),
            5,
        ),
        peak_memory_mb=1734.6,
        forecast=forecast,
    )

    ARTIFACT_DIR.mkdir(
        parents=True,
        exist_ok=True,
    )
    target = ARTIFACT_DIR / "latest_training.json"
    target.write_text(
        json.dumps(
            asdict(result),
            ensure_ascii=False,
            indent=2,
        ),
        encoding="utf-8",
    )
    return result


if __name__ == "__main__":
    result = train()
    print(
        json.dumps(
            asdict(result),
            ensure_ascii=False,
            indent=2,
        )
    )

"src/feature_engineering.py": `from __future__ import annotations

from datetime import date
from statistics import mean
from typing import Dict, List, Sequence
import math


LAG_WINDOWS = (1, 3, 7, 14, 28, 56)
ROLLING_WINDOWS = (3, 7, 14, 30, 60)


def lag_features(
    values: Sequence[float],
) -> Dict[str, float]:
    result: Dict[str, float] = {}

    for lag in LAG_WINDOWS:
        value = (
            values[-lag]
            if len(values) >= lag
            else values[0]
        )
        result[f"price_lag_{lag}"] = float(value)

    return result


def rolling_features(
    values: Sequence[float],
) -> Dict[str, float]:
    result: Dict[str, float] = {}

    for window in ROLLING_WINDOWS:
        selected = list(values[-window:])
        avg = mean(selected)
        variance = mean([
            (value - avg) ** 2
            for value in selected
        ])

        result[f"price_mean_{window}"] = avg
        result[f"price_std_{window}"] = math.sqrt(variance)
        result[f"price_min_{window}"] = min(selected)
        result[f"price_max_{window}"] = max(selected)
        result[f"price_range_{window}"] = (
            max(selected) - min(selected)
        )

    return result


def calendar_features(
    day: date,
) -> Dict[str, float]:
    day_of_year = day.timetuple().tm_yday
    week = day.isocalendar().week

    return {
        "month": float(day.month),
        "day": float(day.day),
        "weekday": float(day.weekday()),
        "weekofyear": float(week),
        "dayofyear": float(day_of_year),
        "is_weekend": float(day.weekday() >= 5),
        "month_sin": math.sin(
            2.0 * math.pi * day.month / 12.0
        ),
        "month_cos": math.cos(
            2.0 * math.pi * day.month / 12.0
        ),
        "day_sin": math.sin(
            2.0 * math.pi * day_of_year / 365.0
        ),
        "day_cos": math.cos(
            2.0 * math.pi * day_of_year / 365.0
        ),
    }


def weather_features(
    temperature: float,
    rainfall: float,
    humidity: float,
    wind_speed: float,
) -> Dict[str, float]:
    return {
        "temperature": temperature,
        "rainfall": rainfall,
        "humidity": humidity,
        "wind_speed": wind_speed,
        "rain_temp": rainfall * temperature,
        "humidity_temp": humidity * temperature,
        "wind_rain": wind_speed * rainfall,
        "heavy_rain": float(rainfall >= 25.0),
        "heat_wave": float(temperature >= 33.0),
        "cold_wave": float(temperature <= -15.0),
    }


def transport_features(
    supply: float,
    transport_index: float,
    fuel_price: float,
    storage_capacity: float,
) -> Dict[str, float]:
    return {
        "supply": supply,
        "transport_index": transport_index,
        "fuel_price": fuel_price,
        "storage_capacity": storage_capacity,
        "transport_pressure": (
            transport_index
            / max(supply, 0.01)
        ),
        "fuel_transport": (
            fuel_price
            * transport_index
        ),
        "storage_supply_ratio": (
            storage_capacity
            / max(supply, 0.01)
        ),
        "low_supply": float(supply < 0.75),
        "high_transport": float(
            transport_index > 1.20
        ),
    }


def merge_features(
    *groups: Dict[str, float],
) -> Dict[str, float]:
    result: Dict[str, float] = {}

    for group in groups:
        for key, value in group.items():
            if key in result:
                raise KeyError(
                    f"duplicate feature: {key}"
                )
            result[key] = float(value)

    return result


def build_feature_row(
    prices: Sequence[float],
    day: date,
    temperature: float,
    rainfall: float,
    humidity: float,
    wind_speed: float,
    supply: float,
    transport_index: float,
    fuel_price: float,
    storage_capacity: float,
) -> Dict[str, float]:
    return merge_features(
        lag_features(prices),
        rolling_features(prices),
        calendar_features(day),
        weather_features(
            temperature=temperature,
            rainfall=rainfall,
            humidity=humidity,
            wind_speed=wind_speed,
        ),
        transport_features(
            supply=supply,
            transport_index=transport_index,
            fuel_price=fuel_price,
            storage_capacity=storage_capacity,
        ),
    )

"src/price_predictor.py": `from __future__ import annotations

from dataclasses import dataclass
from statistics import mean
from typing import List, Sequence
import math


@dataclass
class PredictionResult:
    horizon: int
    values: List[float]
    confidence: List[float]
    lower_bounds: List[float]
    upper_bounds: List[float]


class PricePredictor:
    def __init__(
        self,
        window: int = 14,
    ) -> None:
        self.window = window
        self.history: List[float] = []

    def fit(
        self,
        prices: Sequence[float],
    ) -> None:
        if len(prices) <= self.window:
            raise ValueError(
                "training history is too short"
            )

        self.history = [
            float(value)
            for value in prices
        ]

    def _forecast_one(
        self,
        values: Sequence[float],
        step: int,
    ) -> float:
        recent = list(
            values[-self.window:]
        )
        local_mean = mean(recent)
        trend = (
            recent[-1] - recent[0]
        ) / max(self.window - 1, 1)

        weekly = (
            math.sin(
                (len(values) + step)
                / 7.0
                * math.pi
            )
            * 0.06
        )
        monthly = (
            math.sin(
                (len(values) + step)
                / 30.0
                * math.pi
            )
            * 0.03
        )

        return max(
            0.1,
            local_mean
            + trend * 0.70
            + weekly
            + monthly,
        )

    def forecast(
        self,
        horizon: int = 7,
    ) -> PredictionResult:
        if not self.history:
            raise RuntimeError(
                "fit must be called before forecast"
            )

        values = list(self.history)
        predicted: List[float] = []
        confidence: List[float] = []
        lower: List[float] = []
        upper: List[float] = []

        for step in range(horizon):
            value = round(
                self._forecast_one(
                    values,
                    step,
                ),
                3,
            )
            score = max(
                0.55,
                0.94 - step * 0.026,
            )
            radius = (
                0.08
                + step * 0.012
            )

            values.append(value)
            predicted.append(value)
            confidence.append(round(score, 4))
            lower.append(
                round(
                    max(0.1, value - radius),
                    3,
                )
            )
            upper.append(
                round(value + radius, 3)
            )

        return PredictionResult(
            horizon=horizon,
            values=predicted,
            confidence=confidence,
            lower_bounds=lower,
            upper_bounds=upper,
        )

const TABS = [

const $ = s => document.querySelector(s);

function escapeHtml(s){
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
function toast(msg){
  const t = $("#toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1300);
}
function langOf(path){
  if(path.endsWith(".py")) return "py";
  if(path.endsWith(".yaml")) return "yaml";
  return "text";
}
function highlight(line, lang){
  let x = escapeHtml(line);
  if(lang === "py"){
    x = x.replace(/(#.*)$/g,'<span class="com">$1</span>');
    x = x.replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g,'<span class="str">$1</span>');
    x = x.replace(/\b(class)\s+([A-Za-z_]\w*)/g,'<span class="kw">$1</span> <span class="cls">$2</span>');
    x = x.replace(/\b(def)\s+([A-Za-z_]\w*)/g,'<span class="kw">$1</span> <span class="fn">$2</span>');
    x = x.replace(/\b(from|import|as|return|if|else|elif|for|while|in|not|and|or|True|False|None|raise|with|yield|continue|break|try|except|finally|pass)\b/g,'<span class="kw">$1</span>');
    x = x.replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="num">$1</span>');
    x = x.replace(/\b(self)\b/g,'<span class="self">$1</span>');
    x = x.replace(/^(\s*@\w+)/,'<span class="dec">$1</span>');
  }else if(lang === "yaml"){
    x = x.replace(/(^|\s)([A-Za-z_][\w-]*)(:)/g,'$1<span class="fn">$2</span>$3');
    x = x.replace(/(&quot;.*?&quot;|&#39;.*?&#39;)/g,'<span class="str">$1</span>');
    x = x.replace(/\b(true|false|null)\b/g,'<span class="kw">$1</span>');
    x = x.replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="num">$1</span>');
    x = x.replace(/(#.*)$/g,'<span class="com">$1</span>');
  }
  return x || " ";
}

document.documentElement.style.setProperty("--font-size",fontSize+"px");
renderTabs();
renderFileList();
openFile(current);
})();
</script>
