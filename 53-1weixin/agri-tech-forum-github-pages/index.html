<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111212">
  <title>微信｜技术论坛推送</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./script.js" defer></script>
</head>
<body>
  <main class="stage">
    <div class="phone-shell">
      <section id="chat-screen" class="screen wechat-home" aria-label="傅时年的微信消息首页">
        <header class="wechat-home-head">
          <button type="button" aria-label="收藏">☆</button>
          <strong>微信 <small id="title-unread"></small></strong>
          <button type="button" aria-label="添加">＋</button>
        </header>

        <div class="wechat-search"><span aria-hidden="true"></span><em>搜索</em></div>

        <div class="conversation-area">
          <div class="desktop-login"><span aria-hidden="true"></span><p>Windows 微信已登录</p></div>
          <div id="conversation-list" class="conversation-list"></div>
        </div>

        <footer class="wechat-tabs" aria-label="微信底部导航">
          <span class="active"><i class="tab-icon chat-tab"></i><b>微信</b><em id="tab-unread"></em></span>
          <span><i class="tab-icon contacts-tab"></i><b>通讯录</b></span>
          <span><i class="tab-icon discover-tab"></i><b>发现</b><em class="dot"></em></span>
          <span><i class="tab-icon me-tab"></i><b>我</b></span>
        </footer>

        <aside id="push-notice" class="push-notice" role="button" tabindex="0" hidden aria-hidden="true" aria-label="打开论坛推送：农业部助学金匹配系统推迟上线，疑因系统漏洞被恶意利用">
          <a class="notice-hit" href="./forum.html" aria-label="进入栈界技术论坛查看完整报道"></a>
          <div class="notice-app">
            <span class="forum-icon" aria-hidden="true"><b>&lt;/&gt;</b></span>
            <strong>栈界 · TECH FORUM</strong>
            <time>现在</time>
            <button id="close-notice" type="button" aria-label="关闭推送">×</button>
          </div>
          <h1>农业部助学金匹配系统推迟上线，疑因系统漏洞被恶意利用</h1>
          <p><span>突发</span> 政务系统安全 · 多位开发者称上线计划已临时暂停</p>
          <div class="notice-foot"><em>技术快讯</em><b>轻点查看 ›</b></div>
        </aside>
      </section>
    </div>
  </main>
</body>
</html>
